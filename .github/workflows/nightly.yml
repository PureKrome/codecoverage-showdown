name: Nightly Coverage Showdown

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC daily
  workflow_dispatch:
    inputs:
      humanizer_commit:
        description: 'Optional commit SHA to check out in Humanizer. If empty, the workflow will clone main shallowly.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Resolve versions and decide whether anything has changed
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    env:
      # Prefer the manual input when provided, otherwise fall back to a repo-level Actions variable (vars.HUMANIZER_COMMIT)
      HUMANIZER_COMMIT: ${{ github.event.inputs.humanizer_commit != '' && github.event.inputs.humanizer_commit || vars.HUMANIZER_COMMIT }}
    outputs:
      changed:       ${{ steps.version_check.outputs.changed }}
      coverlet_ver:  ${{ steps.versions.outputs.coverlet_ver }}
      mtecc_ver:       ${{ steps.versions.outputs.mtecc_ver }}
      humanizer_sha: ${{ steps.clone.outputs.humanizer_sha }}
      humanizer_fetch_method: ${{ steps.clone.outputs.humanizer_fetch_method }}

    steps:
      - name: Checkout showdown repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clone Humanizer (main)
        id: clone
        run: |
          echo "HUMANIZER_COMMIT=${HUMANIZER_COMMIT:-<not set>}"
          if [ -n "${HUMANIZER_COMMIT}" ]; then
            echo "HUMANIZER_COMMIT provided; performing a full clone and checking out ${HUMANIZER_COMMIT}"
            rm -rf humanizer
            git clone https://github.com/Humanizr/Humanizer.git humanizer
            git -C humanizer checkout --detach "${HUMANIZER_COMMIT}" || true
            echo "humanizer_fetch_method=full_clone" >> $GITHUB_OUTPUT
          else
            echo "No HUMANIZER_COMMIT provided - cloning main (shallow)"
            git clone --depth=1 --branch main https://github.com/Humanizr/Humanizer.git humanizer
          fi

          echo "humanizer_sha=$(git -C humanizer rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve latest package versions
        id: versions
        run: |
          COVERLET_VER=$(curl -s "https://api.nuget.org/v3-flatcontainer/coverlet.mtp/index.json" \
            | grep -oP '"versions":\s*\[.*?\]' \
            | grep -oP '"[0-9]+\.[0-9]+\.[0-9]+"' \
            | tail -1 \
            | tr -d '"')
          MTECC_VER=$(curl -s "https://api.nuget.org/v3-flatcontainer/microsoft.testing.extensions.codecoverage/index.json" \
            | grep -oP '"versions":\s*\[.*?\]' \
            | grep -oP '"[0-9]+\.[0-9]+\.[0-9]+"' \
            | tail -1 \
            | tr -d '"')

          echo "coverlet_ver=${COVERLET_VER}" >> $GITHUB_OUTPUT
          echo "mtecc_ver=${MTECC_VER}"           >> $GITHUB_OUTPUT
          echo "Coverlet => ${COVERLET_VER}"
          echo "Microsoft.Testing.Extensions.CodeCoverage => ${MTECC_VER}"

      - name: Check for version changes
        id: version_check
        run: |
          VERSIONS_FILE="versions.json"
          FORCE="${{ github.event_name == 'workflow_dispatch' }}"
          COVERLET_VER="${{ steps.versions.outputs.coverlet_ver }}"
          MTECC_VER="${{ steps.versions.outputs.mtecc_ver }}"

          if [ ! -f "$VERSIONS_FILE" ]; then
            echo "No versions.json found - first run"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$FORCE" = "true" ]; then
            echo "Manual trigger - forcing run"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            PREV_COVERLET=$(jq -r '.coverlet_mtp    // ""' "$VERSIONS_FILE")
            PREV_MTECC=$(jq -r '.mtecc_codecoverage        // ""' "$VERSIONS_FILE")
            if [ "$PREV_COVERLET" != "$COVERLET_VER" ] || [ "$PREV_MTECC" != "$MTECC_VER" ]; then
              echo "Version change detected"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "No version change - skipping heavy work"
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ---------------------------------------------------------------------------
  # 2a. Run Coverlet coverage (parallel)
  # ---------------------------------------------------------------------------
  run-coverlet:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUMANIZER_COMMIT: ${{ github.event.inputs.humanizer_commit != '' && github.event.inputs.humanizer_commit || vars.HUMANIZER_COMMIT }}

    steps:
      - name: Checkout showdown repo
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Clone Humanizer (main)
        run: |
          echo "HUMANIZER_COMMIT=${HUMANIZER_COMMIT:-<not set>}"
          if [ -n "${HUMANIZER_COMMIT}" ]; then
            echo "HUMANIZER_COMMIT provided; performing a full clone and checking out ${HUMANIZER_COMMIT}"
            rm -rf humanizer
            git clone https://github.com/Humanizr/Humanizer.git humanizer
            git -C humanizer checkout --detach "${HUMANIZER_COMMIT}" || true
            echo "humanizer_fetch_method=full_clone" >> $GITHUB_OUTPUT
          else
            echo "No HUMANIZER_COMMIT provided - cloning main (shallow)"
            git clone --depth=1 --branch main https://github.com/Humanizr/Humanizer.git humanizer
          fi

      - name: Run Coverlet coverage
        run: |
          mkdir -p results
          chmod +x runners/coverlet.sh
          bash runners/coverlet.sh \
            humanizer \
            "${{ needs.prepare.outputs.coverlet_ver }}" \
            results/coverlet.cobertura.xml

      - name: List results (diagnostic)
        run: |
          echo "-- workspace: $(pwd) --"
          echo "-- results dir --"
          ls -la results || true
          echo "-- humanizer artifacts (root of humanizer) --"
          ls -la humanizer || true
          echo "-- show copied file --"
          if [ -f results/coverlet.cobertura.xml ]; then
            echo "coverlet file exists:" && ls -lh results/coverlet.cobertura.xml
            wc -c results/coverlet.cobertura.xml || true
          else
            echo "coverlet output missing"
            find . -maxdepth 4 -name "*.cobertura*.xml" -print || true
            exit 1
          fi

      - name: Upload Coverlet result
        uses: actions/upload-artifact@v8
        with:
          name: coverlet-result
          path: results/coverlet.cobertura.xml

  # ---------------------------------------------------------------------------
  # 2b. Run MTECC coverage (parallel)
  # ---------------------------------------------------------------------------
  run-mtecc:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUMANIZER_COMMIT: ${{ github.event.inputs.humanizer_commit != '' && github.event.inputs.humanizer_commit || vars.HUMANIZER_COMMIT }}

    steps:
      - name: Checkout showdown repo
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Clone Humanizer (main)
        run: |
          echo "HUMANIZER_COMMIT=${HUMANIZER_COMMIT:-<not set>}"
          if [ -n "${HUMANIZER_COMMIT}" ]; then
            echo "HUMANIZER_COMMIT provided; performing a full clone and checking out ${HUMANIZER_COMMIT}"
            rm -rf humanizer
            git clone https://github.com/Humanizr/Humanizer.git humanizer
            git -C humanizer checkout --detach "${HUMANIZER_COMMIT}" || true
            echo "humanizer_fetch_method=full_clone" >> $GITHUB_OUTPUT
          else
            echo "No HUMANIZER_COMMIT provided - cloning main (shallow)"
            git clone --depth=1 --branch main https://github.com/Humanizr/Humanizer.git humanizer
          fi

      - name: Run MTECC coverage
        run: |
          mkdir -p results
          chmod +x runners/mtecc.sh
          bash runners/mtecc.sh \
            humanizer \
            "${{ needs.prepare.outputs.mtecc_ver }}" \
            results/mtecc.cobertura.xml

      - name: List results (diagnostic)
        run: |
          echo "-- workspace: $(pwd) --"
          echo "-- results dir --"
          ls -la results || true
          echo "-- humanizer artifacts (root of humanizer) --"
          ls -la humanizer || true
          echo "-- show copied file --"
          if [ -f results/mtecc.cobertura.xml ]; then
            echo "mtecc file exists:" && ls -lh results/mtecc.cobertura.xml
            wc -c results/mtecc.cobertura.xml || true
          else
            echo "mtecc output missing"
            find . -maxdepth 4 -name "*.cobertura*.xml" -print || true
            exit 1
          fi

      - name: Upload MTECC result
        uses: actions/upload-artifact@v8
        with:
          name: mtecc-result
          path: results/mtecc.cobertura.xml

  # ---------------------------------------------------------------------------
  # 3. Compare results, commit, and upload Pages artifact
  # ---------------------------------------------------------------------------
  compare:
    needs: [prepare, run-coverlet, run-mtecc]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      HUMANIZER_COMMIT: ${{ github.event.inputs.humanizer_commit != '' && github.event.inputs.humanizer_commit || vars.HUMANIZER_COMMIT }}

    steps:
      - name: Checkout showdown repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET (via global.json)
        uses: actions/setup-dotnet@v5

      - name: Download Coverlet result
        uses: actions/download-artifact@v8
        with:
          name: coverlet-result
          path: results/

      - name: Download MTECC result
        uses: actions/download-artifact@v8
        with:
          name: mtecc-result
          path: results/

      - name: Compare results
        run: |
          mkdir -p docs/data
          dotnet run \
            --project src/CoverageCompare \
            -- \
            results/coverlet.cobertura.xml \
            results/mtecc.cobertura.xml \
            docs/data/latest.json \
            docs/data/history.json \
            docs/feed.xml \
            "${{ needs.prepare.outputs.coverlet_ver }}" \
            "${{ needs.prepare.outputs.mtecc_ver }}" \
            "${{ needs.prepare.outputs.humanizer_sha }}"

      - name: Update versions.json
        run: |
          jq -n \
            --arg c "${{ needs.prepare.outputs.coverlet_ver }}" \
            --arg m "${{ needs.prepare.outputs.mtecc_ver }}" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg s "${{ needs.prepare.outputs.humanizer_sha }}" \
            --arg f "${{ needs.prepare.outputs.humanizer_fetch_method }}" \
            '{coverlet_mtp: $c, mtecc_codecoverage: $m, last_run: $d, humanizer_sha: $s, humanizer_fetch_method: $f}' \
            > versions.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json docs/data/latest.json docs/data/history.json docs/feed.xml
          git diff --cached --quiet || git commit -m \
            "chore: nightly run - coverlet ${{ needs.prepare.outputs.coverlet_ver }} / mtecc ${{ needs.prepare.outputs.mtecc_ver }} / humanizer ${{ needs.prepare.outputs.humanizer_sha }}"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

  # ---------------------------------------------------------------------------
  # 4. Deploy to GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-pages:
    needs: compare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
